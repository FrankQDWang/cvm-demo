services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${CVM_POSTGRES_USER:-cvm}
      POSTGRES_PASSWORD: ${CVM_POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${CVM_POSTGRES_DB:-cvm}
    ports:
      - "${CVM_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CVM_POSTGRES_USER:-cvm} -d ${CVM_POSTGRES_DB:-cvm}"]
      interval: 5s
      timeout: 5s
      retries: 20

  opensearch:
    image: opensearchproject/opensearch:${CVM_OPENSEARCH_VERSION:-2.19.1}
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
    ports:
      - "${CVM_OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  temporal:
    image: temporalio/auto-setup:1.29.4
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${CVM_POSTGRES_USER:-cvm}
      POSTGRES_PWD: ${CVM_POSTGRES_PASSWORD:-}
      POSTGRES_SEEDS: postgres
      POSTGRES_DB: ${CVM_POSTGRES_DB:-cvm}
      ENABLE_ES: "true"
      ES_SEEDS: opensearch
      ES_PORT: 9200
      ES_VERSION: v7
      ES_VIS_INDEX: ${CVM_TEMPORAL_VISIBILITY_INDEX:-temporal_visibility_v1_dev}
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development-sql.yaml
    ports:
      - "${CVM_TEMPORAL_PORT:-7233}:7233"
    volumes:
      - ./infra/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 10s
      retries: 20

  temporal-ui:
    image: temporalio/ui:2.48.0
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_UI_PORT: 8080
    ports:
      - "${CVM_TEMPORAL_UI_PORT:-8080}:8080"

  temporal-admin-tools:
    image: temporalio/admin-tools:${CVM_TEMPORAL_ADMINTOOLS_VERSION:-1.29}
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${CVM_TEMPORAL_NAMESPACE:-default}
    entrypoint:
      - /bin/sh
      - -c
    command:
      - tail -f /dev/null

  langfuse-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${CVM_LANGFUSE_POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${CVM_LANGFUSE_POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${CVM_LANGFUSE_POSTGRES_DB:-}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${CVM_LANGFUSE_POSTGRES_USER:-} -d ${CVM_LANGFUSE_POSTGRES_DB:-}
      interval: 5s
      timeout: 5s
      retries: 20

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${CVM_LANGFUSE_CLICKHOUSE_USER:-}
      CLICKHOUSE_PASSWORD: ${CVM_LANGFUSE_CLICKHOUSE_PASSWORD:-}
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 2s

  langfuse-minio:
    image: cgr.dev/chainguard/minio
    entrypoint: sh
    command: -c 'mkdir -p /data/${CVM_LANGFUSE_S3_BUCKET:-} && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: ${CVM_LANGFUSE_MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${CVM_LANGFUSE_MINIO_ROOT_PASSWORD:-}
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 2s

  langfuse-redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${CVM_LANGFUSE_REDIS_AUTH:-}
      --maxmemory-policy noeviction
    volumes:
      - langfuse_redis_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a ${CVM_LANGFUSE_REDIS_AUTH:-} ping | grep PONG
      interval: 3s
      timeout: 5s
      retries: 20

  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    depends_on: &langfuse_depends_on
      langfuse-postgres:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
    environment: &langfuse_common_env
      NEXTAUTH_URL: http://127.0.0.1:${CVM_EVALS_WEB_PORT:-4202}
      DATABASE_URL: postgresql://${CVM_LANGFUSE_POSTGRES_USER:-}:${CVM_LANGFUSE_POSTGRES_PASSWORD:-}@langfuse-postgres:5432/${CVM_LANGFUSE_POSTGRES_DB:-}
      SALT: ${CVM_LANGFUSE_SALT:-}
      ENCRYPTION_KEY: ${CVM_LANGFUSE_ENCRYPTION_KEY:-}
      TELEMETRY_ENABLED: ${CVM_LANGFUSE_TELEMETRY_ENABLED:-false}
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: ${CVM_LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES:-false}
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: ${CVM_LANGFUSE_CLICKHOUSE_USER:-}
      CLICKHOUSE_PASSWORD: ${CVM_LANGFUSE_CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_USE_AZURE_BLOB: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${CVM_LANGFUSE_S3_BUCKET:-}
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${CVM_LANGFUSE_MINIO_ROOT_USER:-}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${CVM_LANGFUSE_MINIO_ROOT_PASSWORD:-}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: ${CVM_LANGFUSE_S3_BUCKET:-}
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${CVM_LANGFUSE_MINIO_ROOT_USER:-}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${CVM_LANGFUSE_MINIO_ROOT_PASSWORD:-}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ${CVM_LANGFUSE_REDIS_AUTH:-}
      REDIS_TLS_ENABLED: "false"

  api:
    build:
      context: .
      dockerfile: infra/docker/python-app.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      CVM_DATABASE_URL: postgresql+psycopg://${CVM_POSTGRES_USER:-cvm}:${CVM_POSTGRES_PASSWORD:-}@postgres:5432/${CVM_POSTGRES_DB:-cvm}
      CVM_BUILD_ID: ${CVM_BUILD_ID:-local-dev}
      CVM_TEMPORAL_HOST: temporal:7233
      CVM_TEMPORAL_TASK_QUEUE: ${CVM_TEMPORAL_TASK_QUEUE:-cvm-agent-runs}
      CVM_TEMPORAL_NAMESPACE: ${CVM_TEMPORAL_NAMESPACE:-default}
      CVM_TEMPORAL_VISIBILITY_BACKEND: ${CVM_TEMPORAL_VISIBILITY_BACKEND:-opensearch}
      CVM_TEMPORAL_UI_BASE_URL: http://127.0.0.1:${CVM_TEMPORAL_UI_PORT:-8080}
      CVM_AGENT_PROFILE: ${CVM_AGENT_PROFILE:-live}
      CVM_AGENT_MODEL: ${CVM_AGENT_MODEL:-gpt-5.4-mini}
      CVM_AGENT_MODEL_STRATEGY_EXTRACTOR: ${CVM_AGENT_MODEL_STRATEGY_EXTRACTOR:-}
      CVM_AGENT_MODEL_RESUME_MATCHER: ${CVM_AGENT_MODEL_RESUME_MATCHER:-}
      CVM_AGENT_MODEL_SEARCH_REFLECTOR: ${CVM_AGENT_MODEL_SEARCH_REFLECTOR:-}
      CVM_AGENT_THINKING: ${CVM_AGENT_THINKING:-}
      CVM_AGENT_THINKING_STRATEGY_EXTRACTOR: ${CVM_AGENT_THINKING_STRATEGY_EXTRACTOR:-}
      CVM_AGENT_THINKING_RESUME_MATCHER: ${CVM_AGENT_THINKING_RESUME_MATCHER:-}
      CVM_AGENT_THINKING_SEARCH_REFLECTOR: ${CVM_AGENT_THINKING_SEARCH_REFLECTOR:-}
      CVM_AGENT_MODEL_TIMEOUT_SECONDS: ${CVM_AGENT_MODEL_TIMEOUT_SECONDS:-30}
      CVM_AGENT_MIN_ROUNDS: ${CVM_AGENT_MIN_ROUNDS:-3}
      CVM_AGENT_MAX_ROUNDS: ${CVM_AGENT_MAX_ROUNDS:-5}
      CVM_AGENT_ROUND_FETCH_SCHEDULE: ${CVM_AGENT_ROUND_FETCH_SCHEDULE:-10,5,5}
      CVM_AGENT_FINAL_TOP_K: ${CVM_AGENT_FINAL_TOP_K:-5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      CVM_LANGFUSE_PUBLIC_KEY: ${CVM_LANGFUSE_PUBLIC_KEY:-}
      CVM_LANGFUSE_SECRET_KEY: ${CVM_LANGFUSE_SECRET_KEY:-}
      CVM_LANGFUSE_HOST: ${CVM_LANGFUSE_DOCKER_HOST:-}
      CVM_LANGFUSE_BASE_URL: ${CVM_LANGFUSE_BASE_URL:-}
      CVM_LANGFUSE_ENVIRONMENT: ${CVM_LANGFUSE_ENVIRONMENT:-}
      CVM_RESUME_SOURCE_MODE: ${CVM_RESUME_SOURCE_MODE:-cts}
      CVM_CTS_BASE_URL: ${CVM_CTS_BASE_URL:-https://link.hewa.cn}
      CVM_CTS_TENANT_KEY: ${CVM_CTS_TENANT_KEY:-}
      CVM_CTS_TENANT_SECRET: ${CVM_CTS_TENANT_SECRET:-}
      CVM_CTS_TIMEOUT_SECONDS: ${CVM_CTS_TIMEOUT_SECONDS:-20}
      CVM_ALLOW_SENSITIVE_EXPORT: ${CVM_ALLOW_SENSITIVE_EXPORT:-false}
      CVM_EXPORTS_DIR: /app/var/exports
      CVM_CORS_ORIGINS: http://localhost:${CVM_USER_WEB_PORT:-4200},http://127.0.0.1:${CVM_USER_WEB_PORT:-4200},http://localhost:${CVM_OPS_WEB_PORT:-4201},http://127.0.0.1:${CVM_OPS_WEB_PORT:-4201}
    command:
      - /app/.venv/bin/uvicorn
      - cvm_platform.main:app
      - --factory
      - --app-dir
      - services/platform-api/src
      - --host
      - 0.0.0.0
      - --port
      - "8010"
    ports:
      - "${CVM_API_PORT:-8010}:8010"
    volumes:
      - ./var/exports:/app/var/exports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/api/v1/ops/summary')"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: infra/docker/python-app.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      CVM_DATABASE_URL: postgresql+psycopg://${CVM_POSTGRES_USER:-cvm}:${CVM_POSTGRES_PASSWORD:-}@postgres:5432/${CVM_POSTGRES_DB:-cvm}
      CVM_BUILD_ID: ${CVM_BUILD_ID:-local-dev}
      CVM_TEMPORAL_HOST: temporal:7233
      CVM_TEMPORAL_TASK_QUEUE: ${CVM_TEMPORAL_TASK_QUEUE:-cvm-agent-runs}
      CVM_TEMPORAL_NAMESPACE: ${CVM_TEMPORAL_NAMESPACE:-default}
      CVM_TEMPORAL_VISIBILITY_BACKEND: ${CVM_TEMPORAL_VISIBILITY_BACKEND:-opensearch}
      CVM_TEMPORAL_UI_BASE_URL: http://127.0.0.1:${CVM_TEMPORAL_UI_PORT:-8080}
      CVM_AGENT_PROFILE: ${CVM_AGENT_PROFILE:-live}
      CVM_AGENT_MODEL: ${CVM_AGENT_MODEL:-gpt-5.4-mini}
      CVM_AGENT_MODEL_STRATEGY_EXTRACTOR: ${CVM_AGENT_MODEL_STRATEGY_EXTRACTOR:-}
      CVM_AGENT_MODEL_RESUME_MATCHER: ${CVM_AGENT_MODEL_RESUME_MATCHER:-}
      CVM_AGENT_MODEL_SEARCH_REFLECTOR: ${CVM_AGENT_MODEL_SEARCH_REFLECTOR:-}
      CVM_AGENT_THINKING: ${CVM_AGENT_THINKING:-}
      CVM_AGENT_THINKING_STRATEGY_EXTRACTOR: ${CVM_AGENT_THINKING_STRATEGY_EXTRACTOR:-}
      CVM_AGENT_THINKING_RESUME_MATCHER: ${CVM_AGENT_THINKING_RESUME_MATCHER:-}
      CVM_AGENT_THINKING_SEARCH_REFLECTOR: ${CVM_AGENT_THINKING_SEARCH_REFLECTOR:-}
      CVM_AGENT_MODEL_TIMEOUT_SECONDS: ${CVM_AGENT_MODEL_TIMEOUT_SECONDS:-30}
      CVM_AGENT_MIN_ROUNDS: ${CVM_AGENT_MIN_ROUNDS:-3}
      CVM_AGENT_MAX_ROUNDS: ${CVM_AGENT_MAX_ROUNDS:-5}
      CVM_AGENT_ROUND_FETCH_SCHEDULE: ${CVM_AGENT_ROUND_FETCH_SCHEDULE:-10,5,5}
      CVM_AGENT_FINAL_TOP_K: ${CVM_AGENT_FINAL_TOP_K:-5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      CVM_LANGFUSE_PUBLIC_KEY: ${CVM_LANGFUSE_PUBLIC_KEY:-}
      CVM_LANGFUSE_SECRET_KEY: ${CVM_LANGFUSE_SECRET_KEY:-}
      CVM_LANGFUSE_HOST: ${CVM_LANGFUSE_DOCKER_HOST:-}
      CVM_LANGFUSE_BASE_URL: ${CVM_LANGFUSE_BASE_URL:-}
      CVM_LANGFUSE_ENVIRONMENT: ${CVM_LANGFUSE_ENVIRONMENT:-}
      CVM_RESUME_SOURCE_MODE: ${CVM_RESUME_SOURCE_MODE:-cts}
      CVM_CTS_BASE_URL: ${CVM_CTS_BASE_URL:-https://link.hewa.cn}
      CVM_CTS_TENANT_KEY: ${CVM_CTS_TENANT_KEY:-}
      CVM_CTS_TENANT_SECRET: ${CVM_CTS_TENANT_SECRET:-}
      CVM_CTS_TIMEOUT_SECONDS: ${CVM_CTS_TIMEOUT_SECONDS:-20}
    command:
      - /app/.venv/bin/python
      - -m
      - cvm_worker.main

  web-user:
    build:
      context: .
      dockerfile: infra/docker/angular-web.Dockerfile
      args:
        APP_DIR: apps/web-user
        APP_NAME: web-user
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${CVM_USER_WEB_PORT:-4200}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  web-ops:
    build:
      context: .
      dockerfile: infra/docker/angular-web.Dockerfile
      args:
        APP_DIR: apps/web-ops
        APP_NAME: web-ops
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${CVM_OPS_WEB_PORT:-4201}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  web-evals:
    image: docker.io/langfuse/langfuse:3
    depends_on:
      <<: *langfuse_depends_on
      langfuse-worker:
        condition: service_started
    environment:
      <<: *langfuse_common_env
      NEXTAUTH_SECRET: ${CVM_LANGFUSE_NEXTAUTH_SECRET:-}
      LANGFUSE_INIT_ORG_ID: ${CVM_LANGFUSE_INIT_ORG_ID:-}
      LANGFUSE_INIT_ORG_NAME: ${CVM_LANGFUSE_INIT_ORG_NAME:-}
      LANGFUSE_INIT_PROJECT_ID: ${CVM_LANGFUSE_INIT_PROJECT_ID:-}
      LANGFUSE_INIT_PROJECT_NAME: ${CVM_LANGFUSE_INIT_PROJECT_NAME:-}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${CVM_LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${CVM_LANGFUSE_SECRET_KEY:-}
      LANGFUSE_INIT_USER_EMAIL: ${CVM_LANGFUSE_INIT_USER_EMAIL:-}
      LANGFUSE_INIT_USER_NAME: ${CVM_LANGFUSE_INIT_USER_NAME:-}
      LANGFUSE_INIT_USER_PASSWORD: ${CVM_LANGFUSE_INIT_USER_PASSWORD:-}
    ports:
      - "${CVM_EVALS_WEB_PORT:-4202}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://$(hostname -i):3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  opensearch_data:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_minio_data:
  langfuse_redis_data:
