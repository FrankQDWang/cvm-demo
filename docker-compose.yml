services:
  postgres:
    image: postgres:16-alpine
    container_name: cvm-postgres
    environment:
      POSTGRES_USER: cvm
      POSTGRES_PASSWORD: cvm
      POSTGRES_DB: cvm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvm -d cvm"]
      interval: 5s
      timeout: 5s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.29.1
    container_name: cvm-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: cvm
      POSTGRES_PWD: cvm
      POSTGRES_SEEDS: postgres
      POSTGRES_DB: cvm
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development.yaml
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 10s
      retries: 20

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: cvm-temporal-ui
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_UI_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres_data:
