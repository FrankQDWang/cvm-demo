name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - local-cvm-demo
    env:
      AGENT_TOOLSDIRECTORY: ${{ runner.temp }}/../_tool
      RUNNER_TOOL_CACHE: ${{ runner.temp }}/../_tool
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v4
      - name: Verify self-hosted Python
        run: python3.12 --version
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Verify uv
        run: uv --version
      - name: Sync Python workspace
        run: uv sync
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate
        run: make validate
      - name: Test
        run: make test
