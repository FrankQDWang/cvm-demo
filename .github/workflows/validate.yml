name: validate

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - docker-cvm-demo
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install mise
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/share/mise/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"
      - name: Provision Node and pnpm
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mise trust --yes
          mise install
          mise exec -- node --version
          mise exec -- corepack enable
          mise exec -- corepack install
          mise exec -- pnpm --version
      - name: Sync Python workspace
        run: uv sync --locked
      - name: Install Node dependencies
        run: mise exec -- pnpm install --frozen-lockfile
      - name: Validate
        run: make validate
      - name: Test
        run: make test
      - name: Bring up stack
        env:
          CVM_POSTGRES_PORT: "55432"
          CVM_API_PORT: "18010"
          CVM_TEMPORAL_PORT: "17233"
          CVM_TEMPORAL_UI_PORT: "18080"
          CVM_OPENSEARCH_PORT: "19200"
        run: docker compose up -d --build --wait --wait-timeout 240 --remove-orphans postgres opensearch temporal temporal-ui temporal-admin-tools api worker
      - name: Test Stack
        env:
          CVM_POSTGRES_PORT: "55432"
          CVM_API_PORT: "18010"
          CVM_TEMPORAL_PORT: "17233"
          CVM_TEMPORAL_UI_PORT: "18080"
          CVM_OPENSEARCH_PORT: "19200"
          CVM_TEST_API_BASE_URL: "http://host.docker.internal:18010"
          CVM_TEMPORAL_HOST: "host.docker.internal:17233"
          CVM_OPENSEARCH_BASE_URL: "http://host.docker.internal:19200"
        run: make test-stack
      - name: Tear down stack
        if: always()
        run: docker compose down --remove-orphans
