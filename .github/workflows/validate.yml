name: validate

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-static:
    timeout-minutes: 30
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - docker-cvm-demo
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ci-env
        with:
          python-version: "3.12"
          install-node: "true"
          install-node-dependencies: "true"
      - name: Validate Static
        run: make validate-static

  validate-contracts:
    timeout-minutes: 30
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - docker-cvm-demo
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ci-env
        with:
          python-version: "3.12"
          install-node: "true"
          install-node-dependencies: "true"
      - name: Validate Contracts
        run: make validate-contracts

  test:
    timeout-minutes: 20
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - docker-cvm-demo
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ci-env
        with:
          python-version: "3.12"
      - name: Test
        run: make test

  test-stack:
    timeout-minutes: 40
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - docker-cvm-demo
    env:
      UV_PYTHON: "3.12"
      COMPOSE_PROJECT_NAME: cvm-validate-${{ github.run_id }}
      CVM_POSTGRES_PORT: "15432"
      CVM_API_PORT: "18010"
      CVM_TEMPORAL_PORT: "17233"
      CVM_TEMPORAL_UI_PORT: "18080"
      CVM_OPENSEARCH_PORT: "19200"
      CVM_RESUME_SOURCE_MODE: "mock"
      CVM_LLM_MODE: "stub"
      CVM_EXTERNAL_STACK: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ci-env
        with:
          python-version: "3.12"
      - name: Resolve stack host
        run: |
          set -euo pipefail
          STACK_HOST="$(ip route show default 2>/dev/null | awk 'NR==1 {print $3}')"
          if [[ -z "${STACK_HOST}" ]]; then
            STACK_HOST="127.0.0.1"
          fi
          echo "CVM_STACK_HOST=${STACK_HOST}" >> "$GITHUB_ENV"
          echo "CVM_TEST_API_BASE_URL=http://${STACK_HOST}:${CVM_API_PORT}" >> "$GITHUB_ENV"
          echo "CVM_TEMPORAL_HOST=${STACK_HOST}:${CVM_TEMPORAL_PORT}" >> "$GITHUB_ENV"
          echo "CVM_OPENSEARCH_BASE_URL=http://${STACK_HOST}:${CVM_OPENSEARCH_PORT}" >> "$GITHUB_ENV"
          echo "CVM_TEMPORAL_UI_BASE_URL=http://${STACK_HOST}:${CVM_TEMPORAL_UI_PORT}" >> "$GITHUB_ENV"
      - name: Bring up stack
        run: docker compose up -d --build --remove-orphans postgres opensearch temporal temporal-ui temporal-admin-tools api worker
      - name: Test Stack
        run: make test-stack
      - name: Collect stack diagnostics
        if: failure()
        run: ./tools/ci/collect_compose_diagnostics.sh .artifacts/test-stack
      - name: Upload stack diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-stack-diagnostics-${{ github.run_id }}
          path: .artifacts/test-stack
      - name: Tear down stack
        if: always()
        run: docker compose down --remove-orphans
