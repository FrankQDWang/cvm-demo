name: build-verify

permissions:
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-runtime-images:
    timeout-minutes: 45
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - docker-cvm-demo
    steps:
      - uses: actions/checkout@v4
      - name: Verify runtime Docker images
        run: make verify-images
