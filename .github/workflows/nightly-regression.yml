name: nightly-regression

permissions:
  contents: read

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-regression
  cancel-in-progress: false

jobs:
  nightly-regression:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
      COMPOSE_FILE: docker-compose.yml:.github/compose/ci-cache.override.yml
      COMPOSE_PROJECT_NAME: cvm-nightly-${{ github.run_id }}
      CVM_POSTGRES_PORT: "25432"
      CVM_API_PORT: "28010"
      CVM_TEMPORAL_PORT: "27233"
      CVM_TEMPORAL_UI_PORT: "28080"
      CVM_OPENSEARCH_PORT: "29200"
      CVM_RESUME_SOURCE_MODE: "mock"
      CVM_AGENT_PROFILE: "deterministic"
      CVM_AGENT_MODEL: "gpt-5.4-mini"
      CVM_EXTERNAL_STACK: "1"
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ci-env
        with:
          python-version: "3.12"
      - uses: docker/setup-buildx-action@v3
      - name: Restore Docker build cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker-compose.yml', '.github/compose/ci-cache.override.yml', 'infra/docker/**', '.dockerignore', 'uv.lock', 'pnpm-lock.yaml', 'mise.toml', 'pyproject.toml', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - name: Prepare Docker build cache
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/.buildx-cache-new
          mkdir -p /tmp/.buildx-cache
      - name: Resolve stack host
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import socket

          stack_host = "127.0.0.1"
          for candidate in ("host.docker.internal", "gateway.docker.internal", "127.0.0.1"):
              try:
                  socket.getaddrinfo(candidate, None)
              except socket.gaierror:
                  continue
              stack_host = candidate
              break

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"CVM_STACK_HOST={stack_host}\n")
              env_file.write(f"CVM_TEST_API_BASE_URL=http://{stack_host}:{os.environ['CVM_API_PORT']}\n")
              env_file.write(f"CVM_TEMPORAL_HOST={stack_host}:{os.environ['CVM_TEMPORAL_PORT']}\n")
              env_file.write(f"CVM_OPENSEARCH_BASE_URL=http://{stack_host}:{os.environ['CVM_OPENSEARCH_PORT']}\n")
              env_file.write(f"CVM_TEMPORAL_UI_BASE_URL=http://{stack_host}:{os.environ['CVM_TEMPORAL_UI_PORT']}\n")
          PY
      - name: Bring up stack
        run: docker compose up -d --build --remove-orphans postgres opensearch temporal temporal-ui temporal-admin-tools api worker
      - name: Blocking eval gate
        run: ./tools/ci/run_eval_gate.sh
      - name: Temporal visibility smoke
        run: make temporal-visibility-smoke
      - name: Collect nightly diagnostics
        if: failure()
        run: ./tools/ci/collect_compose_diagnostics.sh .artifacts/nightly-regression
      - name: Upload nightly diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-diagnostics-${{ github.run_id }}
          path: .artifacts/nightly-regression
      - name: Tear down stack
        if: always()
        run: docker compose down --remove-orphans
      - name: Finalize Docker build cache
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -d /tmp/.buildx-cache-new ]; then
            mkdir -p /tmp/.buildx-cache
            for service_cache in /tmp/.buildx-cache-new/*; do
              [ -e "$service_cache" ] || continue
              target_dir="/tmp/.buildx-cache/$(basename "$service_cache")"
              rm -rf "$target_dir"
              mv "$service_cache" "$target_dir"
            done
            rmdir /tmp/.buildx-cache-new 2>/dev/null || true
          fi
