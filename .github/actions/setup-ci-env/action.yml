name: Setup CI Environment
description: Prepare the shared Python and optional Node toolchain for CI jobs.

inputs:
  python-version:
    description: Python version used by setup-python and uv.
    required: false
    default: "3.12"
  uv-version:
    description: Pinned uv version to avoid network-dependent latest resolution in CI.
    required: false
    default: "0.11.1"
  install-node:
    description: Install mise and provision Node and pnpm.
    required: false
    default: "false"
  install-node-dependencies:
    description: Run pnpm install after Node and pnpm are provisioned.
    required: false
    default: "false"
  sync-python-workspace:
    description: Run uv sync --locked for the Python workspace.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - uses: astral-sh/setup-uv@v7
      with:
        version: ${{ inputs.uv-version }}
        python-version: ${{ inputs.python-version }}
    - name: Cache uv downloads
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ inputs.python-version }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-${{ inputs.python-version }}-
    - name: Cache mise toolchain
      if: ${{ inputs.install-node == 'true' || inputs.install-node-dependencies == 'true' }}
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/mise
          ~/.local/share/mise
        key: ${{ runner.os }}-mise-${{ hashFiles('mise.toml') }}
        restore-keys: |
          ${{ runner.os }}-mise-
    - name: Cache pnpm store
      if: ${{ inputs.install-node-dependencies == 'true' }}
      uses: actions/cache@v4
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml', 'mise.toml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-
    - name: Install mise
      if: ${{ inputs.install-node == 'true' || inputs.install-node-dependencies == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        curl -fsSL https://mise.run | sh
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "$HOME/.local/share/mise/bin" >> "$GITHUB_PATH"
        echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"
    - name: Provision Node and pnpm
      if: ${{ inputs.install-node == 'true' || inputs.install-node-dependencies == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        mise trust --yes
        mise install
        mise exec -- node --version
        mise exec -- corepack enable
        mise exec -- corepack install
        mise exec -- pnpm config set store-dir "$HOME/.local/share/pnpm/store"
        mise exec -- pnpm --version
    - name: Sync Python workspace
      if: ${{ inputs.sync-python-workspace == 'true' }}
      shell: bash
      run: uv sync --locked
    - name: Generate CI compose password
      shell: bash
      run: |
        set -euo pipefail
        if [ -n "${CVM_POSTGRES_PASSWORD:-}" ]; then
          exit 0
        fi
        python - <<'PY'
        import os
        import secrets

        password = f"ci-pg-{secrets.token_hex(8)}"
        with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
            env_file.write(f"CVM_POSTGRES_PASSWORD={password}\n")
        PY
    - name: Install Node dependencies
      if: ${{ inputs.install-node-dependencies == 'true' }}
      shell: bash
      run: mise exec -- pnpm install --frozen-lockfile
