openapi: 3.1.0
info:
  title: CVM Platform API
  version: "0.1.0"
  description: Local-first MVP boundary contract.
servers:
  - url: http://localhost:8000
paths:
  /api/v1/cases:
    post:
      operationId: createCase
      summary: Create a JD case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseRequest"
      responses:
        "200":
          description: Case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCaseResponse"
        "400":
          $ref: "#/components/responses/InvalidInput"
  /api/v1/cases/{caseId}/jd-versions:
    post:
      operationId: createJdVersion
      summary: Create a JD version
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9][A-Za-z0-9_-]{0,127}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJdVersionRequest"
      responses:
        "200":
          description: JD version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJdVersionResponse"
        "400":
          $ref: "#/components/responses/InvalidInput"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/agent-runs:
    post:
      operationId: createAgentRun
      summary: Create an agent run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRunRequest"
      responses:
        "200":
          description: Agent run created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgentRunResponse"
        "400":
          $ref: "#/components/responses/InvalidInput"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/TransientDependencyFailure"
    get:
      operationId: listAgentRuns
      summary: List agent runs
      responses:
        "200":
          description: Agent runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunListResponse"
  /api/v1/agent-runs/{runId}:
    get:
      operationId: getAgentRun
      summary: Get agent run status and result
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9][A-Za-z0-9_-]{0,127}$'
      responses:
        "200":
          description: Agent run status and result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/case-candidates/{candidateId}:
    get:
      operationId: getCaseCandidate
      summary: Get candidate detail
      parameters:
        - in: path
          name: candidateId
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9][A-Za-z0-9_-]{0,127}$'
      responses:
        "200":
          description: Candidate detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/case-candidates/{candidateId}/verdict:
    put:
      operationId: saveCandidateVerdict
      summary: Save a candidate verdict
      parameters:
        - in: path
          name: candidateId
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9][A-Za-z0-9_-]{0,127}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveVerdictRequest"
      responses:
        "200":
          description: Verdict saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveVerdictResponse"
        "400":
          $ref: "#/components/responses/InvalidInput"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/exports:
    post:
      operationId: createExport
      summary: Create an export job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExportRequest"
      responses:
        "200":
          description: Export job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateExportResponse"
        "400":
          $ref: "#/components/responses/InvalidInput"
        "403":
          $ref: "#/components/responses/PermissionDenied"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/ExternalDependencyFailure"
  /api/v1/ops/summary:
    get:
      operationId: getOpsSummary
      summary: Get ops summary
      responses:
        "200":
          description: Ops summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsSummaryResponse"
  /api/v1/ops/temporal/agent-runs/{runId}:
    get:
      operationId: getAgentRunTemporalDiagnostic
      summary: Get Temporal diagnostic for an agent run
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9][A-Za-z0-9_-]{0,127}$'
      responses:
        "200":
          description: Temporal agent run diagnostic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemporalAgentRunDiagnosticResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/TransientDependencyFailure"
  /api/v1/evals/runs:
    post:
      operationId: createEvalRun
      summary: Create an eval run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEvalRunRequest"
      responses:
        "200":
          description: Eval run created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEvalRunResponse"
        "400":
          $ref: "#/components/responses/InvalidInput"
components:
  schemas:
    CreateCaseRequest:
      type: object
      additionalProperties: false
      required: [title, ownerTeamId]
      properties:
        title:
          type: string
          minLength: 1
          pattern: '^[^\x00]*$'
        ownerTeamId:
          type: string
          minLength: 1
          pattern: '^[^\x00]*$'
    CreateCaseResponse:
      type: object
      required: [caseId, status]
      properties:
        caseId:
          type: string
        status:
          type: string
    CreateJdVersionRequest:
      type: object
      additionalProperties: false
      required: [rawText, source]
      properties:
        rawText:
          type: string
          minLength: 1
          pattern: '^[^\x00]*$'
        source:
          type: string
          minLength: 1
          pattern: '^[^\x00]*$'
    CreateJdVersionResponse:
      type: object
      required: [jdVersionId, versionNo, status]
      properties:
        jdVersionId:
          type: string
        versionNo:
          type: integer
        status:
          type: string
    AgentRunConfig:
      type: object
      additionalProperties: false
      required: [maxRounds, roundFetchSchedule, finalTopK]
      properties:
        maxRounds:
          type: integer
          minimum: 1
        roundFetchSchedule:
          type: array
          minItems: 1
          items:
            type: integer
            minimum: 1
        finalTopK:
          type: integer
          minimum: 1
    AgentRuntimeConfigEntry:
      type: object
      additionalProperties: false
      required: [modelVersion, thinkingEffort]
      properties:
        modelVersion:
          type: string
        thinkingEffort:
          type:
            - string
            - "null"
          enum: [none, minimal, low, medium, high, xhigh, null]
    AgentRuntimeConfig:
      type: object
      additionalProperties: false
      required: [strategyExtractor, resumeMatcher, searchReflector]
      properties:
        strategyExtractor:
          $ref: "#/components/schemas/AgentRuntimeConfigEntry"
        resumeMatcher:
          $ref: "#/components/schemas/AgentRuntimeConfigEntry"
        searchReflector:
          $ref: "#/components/schemas/AgentRuntimeConfigEntry"
    CreateAgentRunRequest:
      type: object
      additionalProperties: false
      required: [jdText, sourcingPreferenceText]
      properties:
        jdText:
          type: string
          minLength: 1
          pattern: '^[^\x00]*$'
        sourcingPreferenceText:
          type: string
          minLength: 1
          pattern: '^[^\x00]*$'
    CreateAgentRunResponse:
      type: object
      additionalProperties: false
      required: [runId, status]
      properties:
        runId:
          type: string
        status:
          type: string
    AgentRunStep:
      type: object
      additionalProperties: false
      required: [stepNo, stepType, title, status, summary, payload, occurredAt]
      properties:
        stepNo:
          type: integer
          minimum: 1
        roundNo:
          type:
            - integer
            - "null"
          minimum: 1
        stepType:
          type: string
        title:
          type: string
        status:
          type: string
        summary:
          type: string
        payload:
          type: object
          additionalProperties: true
        occurredAt:
          type: string
          format: date-time
    AgentShortlistCandidate:
      type: object
      additionalProperties: false
      required:
        [
          candidateId,
          externalIdentityId,
          name,
          title,
          company,
          location,
          summary,
          reason,
          score,
          sourceRound,
        ]
      properties:
        candidateId:
          type: string
        externalIdentityId:
          type: string
        name:
          type: string
        title:
          type: string
        company:
          type: string
        location:
          type: string
        summary:
          type: string
        reason:
          type: string
        score:
          type: number
        sourceRound:
          type: integer
          minimum: 1
    AgentRunListItem:
      type: object
      additionalProperties: false
      required: [runId, status, currentRound, createdAt]
      properties:
        runId:
          type: string
        status:
          type: string
        currentRound:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        finishedAt:
          type:
            - string
            - "null"
          format: date-time
        errorCode:
          type:
            - string
            - "null"
        errorMessage:
          type:
            - string
            - "null"
        langfuseTraceUrl:
          type:
            - string
            - "null"
    AgentRunListResponse:
      type: object
      additionalProperties: false
      required: [runs]
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/AgentRunListItem"
    AgentRunResponse:
      type: object
      additionalProperties: false
      required:
        [
          runId,
          caseId,
          status,
          jdText,
          sourcingPreferenceText,
          config,
          currentRound,
          modelVersion,
          agentRuntimeConfig,
          promptVersion,
          workflowId,
          temporalNamespace,
          temporalTaskQueue,
          steps,
          finalShortlist,
          seenResumeIds,
          createdAt,
          startedAt,
        ]
      properties:
        runId:
          type: string
        caseId:
          type: string
        status:
          type: string
        jdText:
          type: string
        sourcingPreferenceText:
          type: string
        config:
          $ref: "#/components/schemas/AgentRunConfig"
        currentRound:
          type: integer
          minimum: 0
        modelVersion:
          type: string
        agentRuntimeConfig:
          $ref: "#/components/schemas/AgentRuntimeConfig"
        promptVersion:
          type: string
        workflowId:
          type:
            - string
            - "null"
        temporalNamespace:
          type:
            - string
            - "null"
        temporalTaskQueue:
          type:
            - string
            - "null"
        langfuseTraceId:
          type:
            - string
            - "null"
        langfuseTraceUrl:
          type:
            - string
            - "null"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/AgentRunStep"
        finalShortlist:
          type: array
          items:
            $ref: "#/components/schemas/AgentShortlistCandidate"
        seenResumeIds:
          type: array
          items:
            type: string
        errorCode:
          type:
            - string
            - "null"
        errorMessage:
          type:
            - string
            - "null"
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type:
            - string
            - "null"
          format: date-time
    CandidateCard:
      type: object
      additionalProperties: false
      required: [candidateId, externalIdentityId, name, title, company, location]
      properties:
        candidateId:
          type: string
        externalIdentityId:
          type: string
        name:
          type: string
        title:
          type: string
        company:
          type: string
        location:
          type: string
        summary:
          type: string
    ResumeEducationItem:
      type: object
      additionalProperties: false
      required: [school, degree, major, startTime, endTime]
      properties:
        school:
          type: string
        degree:
          type: string
        major:
          type: string
        startTime:
          type:
            - string
            - "null"
        endTime:
          type:
            - string
            - "null"
    ResumeWorkExperienceItem:
      type: object
      additionalProperties: false
      required: [company, title, duration, startTime, endTime, summary]
      properties:
        company:
          type: string
        title:
          type: string
        duration:
          type:
            - string
            - "null"
        startTime:
          type:
            - string
            - "null"
        endTime:
          type:
            - string
            - "null"
        summary:
          type:
            - string
            - "null"
    ResumeProjection:
      type: object
      additionalProperties: false
      required:
        [
          workYear,
          currentLocation,
          expectedLocation,
          jobState,
          expectedSalary,
          age,
          education,
          workExperience,
          workSummaries,
          projectNames,
        ]
      properties:
        workYear:
          type:
            - integer
            - "null"
        currentLocation:
          type:
            - string
            - "null"
        expectedLocation:
          type:
            - string
            - "null"
        jobState:
          type:
            - string
            - "null"
        expectedSalary:
          type:
            - string
            - "null"
        age:
          type:
            - integer
            - "null"
        education:
          type: array
          items:
            $ref: "#/components/schemas/ResumeEducationItem"
        workExperience:
          type: array
          items:
            $ref: "#/components/schemas/ResumeWorkExperienceItem"
        workSummaries:
          type: array
          items:
            type: string
        projectNames:
          type: array
          items:
            type: string
    CandidateResumeView:
      type: object
      additionalProperties: false
      required: [snapshotId, projection]
      properties:
        snapshotId:
          type: string
        projection:
          $ref: "#/components/schemas/ResumeProjection"
    ResumeAnalysis:
      type: object
      additionalProperties: false
      required: [status, summary, evidenceSpans, riskFlags]
      properties:
        status:
          type: string
        summary:
          type: string
        evidenceSpans:
          type: array
          items:
            type: string
        riskFlags:
          type: array
          items:
            type: string
    VerdictRecord:
      type: object
      additionalProperties: false
      required: [verdict, reasons, actorId, createdAt]
      properties:
        verdict:
          $ref: "#/components/schemas/Verdict"
        reasons:
          type: array
          items:
            type: string
        notes:
          type:
            - string
            - "null"
        actorId:
          type: string
        createdAt:
          type: string
          format: date-time
    CandidateDetailResponse:
      type: object
      additionalProperties: false
      required: [candidate, resumeView, aiAnalysis, verdictHistory]
      properties:
        candidate:
          $ref: "#/components/schemas/CandidateCard"
        resumeView:
          $ref: "#/components/schemas/CandidateResumeView"
        aiAnalysis:
          $ref: "#/components/schemas/ResumeAnalysis"
        verdictHistory:
          type: array
          items:
            $ref: "#/components/schemas/VerdictRecord"
    Verdict:
      type: string
      enum: ["Match", "Maybe", "No"]
    SaveVerdictRequest:
      type: object
      additionalProperties: false
      required: [verdict, reasons, actorId]
      properties:
        verdict:
          $ref: "#/components/schemas/Verdict"
        reasons:
          type: array
          items:
            type: string
        notes:
          type: string
          pattern: '^[^\x00]*$'
        actorId:
          type: string
          minLength: 1
          pattern: '^[^\x00]*$'
        resumeSnapshotId:
          type:
            - string
            - "null"
          pattern: '^[^\x00]*$'
    SaveVerdictResponse:
      type: object
      additionalProperties: false
      required: [candidateId, latestVerdict, updatedAt]
      properties:
        candidateId:
          type: string
        latestVerdict:
          $ref: "#/components/schemas/Verdict"
        updatedAt:
          type: string
          format: date-time
    CreateExportRequest:
      type: object
      additionalProperties: false
      required: [caseId, maskPolicy, reason, idempotencyKey]
      properties:
        caseId:
          type: string
          minLength: 1
          pattern: '^[^\x00]*$'
        maskPolicy:
          type: string
          enum: [masked, sensitive]
        reason:
          type: string
          minLength: 1
          pattern: '^[^\x00]*$'
        idempotencyKey:
          type: string
          minLength: 1
          pattern: '^[^\x00]*$'
    CreateExportResponse:
      type: object
      additionalProperties: false
      required: [exportJobId, status]
      properties:
        exportJobId:
          type: string
        status:
          type: string
        filePath:
          type:
            - string
            - "null"
    MetricItem:
      type: object
      additionalProperties: false
      required: [name, value]
      properties:
        name:
          type: string
        value:
          type: number
    AgentRunStatusCount:
      type: object
      additionalProperties: false
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer
    AgentRunFailureCount:
      type: object
      additionalProperties: false
      required: [code, count]
      properties:
        code:
          type: string
        count:
          type: integer
    QueueSummary:
      type: object
      additionalProperties: false
      required: [agentRuns]
      properties:
        agentRuns:
          type: array
          items:
            $ref: "#/components/schemas/AgentRunStatusCount"
    FailureSummary:
      type: object
      additionalProperties: false
      required: [agentRuns]
      properties:
        agentRuns:
          type: array
          items:
            $ref: "#/components/schemas/AgentRunFailureCount"
    LatencySummary:
      type: object
      additionalProperties: false
      required: [avgAgentRunSeconds]
      properties:
        avgAgentRunSeconds:
          type: number
    OpsVersionInfo:
      type: object
      additionalProperties: false
      required:
        [
          api,
          apiBuildId,
          workerBuildId,
          externalCts,
          temporalNamespace,
          temporalUiUrl,
          temporalVisibilityBackend,
        ]
      properties:
        api:
          type: string
        apiBuildId:
          type: string
        workerBuildId:
          type: string
        externalCts:
          type: string
        temporalNamespace:
          type: string
        temporalUiUrl:
          type: string
        temporalVisibilityBackend:
          type: string
    OpsSummaryResponse:
      type: object
      additionalProperties: false
      required: [queue, failures, latency, version, metrics]
      properties:
        queue:
          $ref: "#/components/schemas/QueueSummary"
        failures:
          $ref: "#/components/schemas/FailureSummary"
        latency:
          $ref: "#/components/schemas/LatencySummary"
        version:
          $ref: "#/components/schemas/OpsVersionInfo"
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/MetricItem"
    TemporalAgentRunDiagnosticResponse:
      type: object
      additionalProperties: false
      required:
        [
          runId,
          workflowId,
          namespace,
          taskQueue,
          appStatus,
          currentRound,
          stepCount,
          finalShortlistCount,
          temporalExecutionFound,
          visibilityIndexed,
          visibilityBackend,
          temporalUiUrl,
        ]
      properties:
        runId:
          type: string
        workflowId:
          type: string
        namespace:
          type: string
        taskQueue:
          type: string
        appStatus:
          type: string
        currentRound:
          type: integer
          minimum: 0
        stepCount:
          type: integer
          minimum: 0
        finalShortlistCount:
          type: integer
          minimum: 0
        temporalExecutionFound:
          type: boolean
        temporalExecutionStatus:
          type:
            - string
            - "null"
        visibilityIndexed:
          type: boolean
        visibilityBackend:
          type: string
        startedAt:
          type:
            - string
            - "null"
          format: date-time
        closedAt:
          type:
            - string
            - "null"
          format: date-time
        error:
          type:
            - string
            - "null"
        errorCode:
          type:
            - string
            - "null"
        errorMessage:
          type:
            - string
            - "null"
        stopReason:
          type:
            - string
            - "null"
        langfuseTraceUrl:
          type:
            - string
            - "null"
        temporalUiUrl:
          type: string
    CreateEvalRunRequest:
      type: object
      additionalProperties: false
      required: [suiteId, datasetId, targetVersion]
      properties:
        suiteId:
          type: string
          minLength: 1
          pattern: '^[^\x00]*$'
        datasetId:
          type: string
          minLength: 1
          pattern: '^[^\x00]*$'
        targetVersion:
          type: string
          minLength: 1
          pattern: '^[^\x00]*$'
    CreateEvalRunResponse:
      type: object
      additionalProperties: false
      required: [evalRunId, status]
      properties:
        evalRunId:
          type: string
        status:
          type: string
    ApiErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message, retryable]
      properties:
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
  responses:
    InvalidInput:
      description: Invalid input or contract validation failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Conflict:
      description: The current resource state does not allow this operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    PermissionDenied:
      description: The caller is not allowed to perform this operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    ExternalDependencyFailure:
      description: A required upstream dependency returned a non-retryable failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    TransientDependencyFailure:
      description: A required upstream dependency is temporarily unavailable or retryable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
