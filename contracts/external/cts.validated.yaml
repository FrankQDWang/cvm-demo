openapi: 3.1.0
info:
  title: CTS Candidate Search API
  version: "2026-03-23"
  description: |
    Single validated contract for the CTS candidate search endpoint.
    This contract is derived from live black-box probes and backed by
    evidence/cts/validation_report.json.

servers:
  - url: https://link.hewa.cn
    description: Production environment validated on 2026-03-23.

paths:
  /thirdCooperate/search/candidate/cts:
    post:
      summary: Search candidates
      operationId: searchCandidates
      description: |
        Black-box validated contract. Request bodies may include extra fields;
        validated fields are listed explicitly below.
      x-last-verified-at: "2026-03-23T03:24:58+00:00"
      x-source-case-ids:
        - baseline_minimal
        - baseline_zero_result
        - edge_missing_both
        - edge_page_zero
        - auth_invalid_secret
      parameters:
        - name: trace_id
          in: header
          required: true
          description: Required in all validated requests.
          schema:
            type: string
          x-source-case-ids:
            - baseline_minimal
            - auth_invalid_secret
      security:
        - tenantKeyAuth: []
          tenantSecretAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateSearchRequest"
      responses:
        "200":
          description: Success envelope. `data` may be an object or `null`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateSearchResponse"
        "401":
          description: Invalid tenant credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthFailureResponse"

components:
  securitySchemes:
    tenantKeyAuth:
      type: apiKey
      in: header
      name: tenant_key
    tenantSecretAuth:
      type: apiKey
      in: header
      name: tenant_secret

  schemas:
    CandidateSearchRequest:
      type: object
      additionalProperties: true
      description: |
        Unknown request fields were accepted in validated probes, so the request
        schema intentionally keeps additionalProperties enabled.
      x-source-case-ids:
        - baseline_minimal
        - edge_unknown_field
      properties:
        jd:
          type: string
          x-source-case-ids:
            - field_jd_text
        keyword:
          type:
            - string
            - "null"
          x-source-case-ids:
            - field_keyword_text
            - edge_keyword_null
          x-notes: Null was accepted and behaved like an omitted keyword in validated probes.
        school:
          type: string
          x-source-case-ids:
            - field_school_text
        company:
          type: string
          x-source-case-ids:
            - field_company_text
        position:
          type: string
          x-source-case-ids:
            - field_position_text
        workContent:
          type: string
          x-source-case-ids:
            - field_work_content_text
        location:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          x-source-case-ids:
            - edge_location_string
            - field_location_array
        degree:
          type: integer
          x-source-case-ids:
            - field_degree_1
            - field_degree_2
            - field_degree_3
            - field_degree_4
          x-notes: Values 1-3 changed result totals materially; value 4 was accepted and returned near-baseline results. No enum is published.
        schoolType:
          type: integer
          x-source-case-ids:
            - field_schoolType_1
            - field_schoolType_2
            - field_schoolType_3
            - field_schoolType_4
            - field_schoolType_5
            - field_schoolType_6
            - field_schoolType_7
          x-notes: Values 1-6 changed result totals materially; value 7 was accepted and returned near-baseline results. No enum is published.
        workExperienceRange:
          type: integer
          x-source-case-ids:
            - field_workExperienceRange_1
            - field_workExperienceRange_2
            - field_workExperienceRange_3
            - field_workExperienceRange_4
            - field_workExperienceRange_5
            - field_workExperienceRange_6
            - field_workExperienceRange_7
          x-notes: Values 1-5 changed result totals materially; values 6-7 were accepted and returned near-baseline results. No enum is published.
        gender:
          type: integer
          x-source-case-ids:
            - field_gender_1
            - field_gender_2
            - field_gender_3
          x-notes: Values 1-2 changed result totals materially; value 3 was accepted and returned near-baseline results. No enum is published.
        age:
          type: integer
          x-source-case-ids:
            - field_age_1
            - field_age_2
            - field_age_3
            - field_age_4
            - field_age_5
            - field_age_6
            - field_age_7
          x-notes: Values 1-6 changed result totals materially; value 7 was accepted and returned near-baseline results. No enum is published.
        active:
          type: integer
          x-source-case-ids:
            - field_active_1
            - field_active_2
            - field_active_3
            - field_active_4
            - field_active_5
            - field_active_6
          x-notes: Values 1-4 changed result totals materially; values 5-6 were accepted and returned near-baseline results. No enum is published.
        page:
          type:
            - integer
            - string
          x-source-case-ids:
            - baseline_minimal
            - edge_missing_page
            - edge_page_zero
            - edge_page_str_numeric
            - edge_page_str_text
          x-notes: Missing page or page=0 returned data:null. Numeric and non-numeric strings were accepted and returned object data.
        pageSize:
          type:
            - integer
            - string
          x-source-case-ids:
            - baseline_minimal
            - edge_missing_page_size
            - edge_page_size_zero
            - edge_page_size_str_numeric
            - edge_page_size_str_text
          x-notes: Missing pageSize, pageSize=0, and pageSize='abc' returned data:null. Numeric string '1' returned object data.

    CandidateSearchResponse:
      type: object
      additionalProperties: true
      required:
        - code
        - status
        - message
        - data
      x-source-case-ids:
        - baseline_minimal
        - baseline_zero_result
        - edge_missing_both
        - edge_page_zero
      properties:
        code:
          type: integer
        status:
          type: string
        message:
          type: string
        data:
          oneOf:
            - $ref: "#/components/schemas/CandidateSearchData"
            - type: "null"
          x-notes: data became null when paging fields were missing or invalid in validated probes.
        timings:
          $ref: "#/components/schemas/Timings"
      x-notes: timings was only observed when data was an object.

    CandidateSearchData:
      type: object
      additionalProperties: true
      required:
        - candidates
        - total
        - page
        - pageSize
      x-source-case-ids:
        - baseline_minimal
        - baseline_zero_result
        - baseline_wide_keyword
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
        total:
          type: integer
        page:
          type:
            - integer
            - string
        pageSize:
          type:
            - integer
            - string

    Candidate:
      type: object
      additionalProperties: true
      required:
        - activeStatus
        - age
        - educationList
        - expectedIndustry
        - expectedIndustryIds
        - expectedJobCategory
        - expectedJobCategoryIds
        - expectedLocation
        - expectedLocationIds
        - expectedSalary
        - gender
        - jobState
        - nowLocation
        - projectNameAll
        - workExperienceList
        - workSummariesAll
        - workYear
      x-source-case-ids:
        - baseline_minimal
        - baseline_wide_keyword
        - baseline_wide_company
        - baseline_wide_jd
        - baseline_wide_location
      x-notes: All required fields above were present in 97/97 validated candidate objects.
      properties:
        activeStatus:
          type: string
        age:
          type: integer
        educationList:
          type: array
          items:
            $ref: "#/components/schemas/EducationItem"
        expectedIndustry:
          type: string
        expectedIndustryIds:
          type: array
          items:
            type: string
        expectedJobCategory:
          type: string
        expectedJobCategoryIds:
          type: array
          items:
            type: string
        expectedLocation:
          type: string
        expectedLocationIds:
          type: array
          items:
            type: string
        expectedSalary:
          type: string
        gender:
          type: string
        jobState:
          type: string
        nowLocation:
          type: string
        projectNameAll:
          type: array
          items:
            type: string
          x-source-case-ids:
            - baseline_minimal
            - baseline_wide_keyword
            - baseline_wide_company
          x-notes: Observed as a stable array field; 81/97 sampled candidates had non-empty string items.
        workExperienceList:
          type: array
          items:
            $ref: "#/components/schemas/WorkExperienceItem"
        workSummariesAll:
          type: array
          items:
            type: string
        workYear:
          type: integer

    EducationItem:
      type: object
      additionalProperties: true
      x-source-case-ids:
        - baseline_minimal
        - baseline_wide_company
        - baseline_wide_jd
        - baseline_wide_location
      properties:
        degree:
          type: string
        education:
          type: string
        educationCode:
          type: string
        endTime:
          type: string
        school:
          type: string
        schoolTags:
          type: array
          items: {}
          x-source-case-ids:
            - baseline_minimal
            - baseline_wide_keyword
            - baseline_wide_company
            - baseline_wide_location
          x-notes: Present in 223/223 sampled education items, but always observed as an empty array.
        sortNum:
          type: integer
        speciality:
          type: string
        startTime:
          type: string
        unified:
          type: string

    WorkExperienceItem:
      type: object
      additionalProperties: true
      x-source-case-ids:
        - baseline_minimal
        - baseline_wide_keyword
        - baseline_wide_company
        - baseline_wide_jd
      properties:
        categoryIdLevel1:
          type: string
        categoryIdLevel2:
          type: string
        categoryIdLevel3:
          type: string
        categoryIdsAll:
          type: array
          items:
            type: string
        company:
          type: string
        createTime:
          type: integer
        duration:
          type: string
        endTime:
          type: string
        groupCompanyIds:
          type: array
          items:
            type: string
          x-notes: Present in 153/485 sampled work experience items.
        industryIdLevel1:
          type: string
        industryIdLevel2:
          type: string
        industryIdsAll:
          type: array
          items:
            type: string
        level:
          type: integer
        sortNum:
          type: integer
        startTime:
          type: string
        summary:
          type: string
        tagNames:
          type: array
          items: {}
          x-source-case-ids:
            - baseline_minimal
            - baseline_wide_keyword
            - baseline_wide_company
            - baseline_wide_jd
          x-notes: Present in 485/485 sampled work experience items, but always observed as an empty array.
        title:
          type: string
        updateTime:
          type: integer
        years:
          type: array
          items:
            type: integer

    Timings:
      type: object
      additionalProperties: true
      required:
        - validation
        - configPreparation
        - paramsPreparation
        - apiRequest
        - dataProcessing
        - totalTime
      x-source-case-ids:
        - baseline_minimal
        - baseline_zero_result
        - baseline_wide_keyword
      properties:
        validation:
          type: integer
        configPreparation:
          type: integer
        paramsPreparation:
          type: integer
        apiRequest:
          type: integer
        dataProcessing:
          type: integer
        totalTime:
          type: integer

    AuthFailureResponse:
      type: object
      additionalProperties: true
      required:
        - code
        - status
        - message
        - data
      x-source-case-ids:
        - auth_invalid_secret
      properties:
        code:
          type: integer
          const: 20001
        status:
          type: string
          const: fail
        message:
          type: string
        data:
          type: "null"
